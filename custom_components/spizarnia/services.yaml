add_item:
  fields:
    product:
      required: true
      example: "Passata pomidorowa"
      selector:
        text:
    quantity:
      required: true
      example: 2
      selector:
        number:
          min: 0.1
          max: 1000
          step: 0.1
          mode: box
    unit:
      example: "słoik"
      selector:
        select:
          options:
            - "szt"
            - "słoik"
            - "butelka"
            - "puszka"
            - "opak"
            - "kg"
            - "g"
            - "l"
            - "ml"
    best_before:
      example: "2027-06-30"
      selector:
        text:
    best_before_precision:
      example: "day"
      selector:
        select:
          options:
            - "day"
            - "month"
            - "year"
            - "none"
    shelf_id:
      selector:
        text:

consume:
  fields:
    product:
      required: true
      example: "Passata pomidorowa"
      selector:
        text:
    quantity:
      required: true
      example: 1
      selector:
        number:
          min: 0.1
          max: 1000
          step: 0.1
          mode: box

move_item:
  fields:
    item_id:
      required: true
      selector:
        text:
    shelf_id:
      required: true
      selector:
        text:
