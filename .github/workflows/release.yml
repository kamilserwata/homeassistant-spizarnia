name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Create release zip
        run: |
          cd custom_components/spizarnia
          zip -r "$GITHUB_WORKSPACE/spizarnia.zip" . -x "*.pyc" -x "__pycache__/*"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: spizarnia.zip
          generate_release_notes: true
