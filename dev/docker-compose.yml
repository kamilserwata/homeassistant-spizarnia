services:
  homeassistant:
    container_name: spizarnia-dev
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "8123:8123"
    volumes:
      - ./config:/config
      - ../custom_components:/config/custom_components
    environment:
      - TZ=Europe/Warsaw
